name: Update Data

on:
  # Weekly: Wednesdays at 02:00 UTC
  schedule:
    - cron: '0 2 * * 3'
  # Manual trigger from the Actions tab
  workflow_dispatch:

# Allow only one pipeline run at a time; do not cancel in-progress runs
concurrency:
  group: update-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read          # checkout repo
  pages: write            # deploy to GitHub Pages
  id-token: write         # OIDC for deploy-pages

jobs:
  fetch-main:
    runs-on: ubuntu-latest
    # Hard ceiling is 6h; leave 10m buffer for post-steps
    timeout-minutes: 350
    outputs:
      incomplete: ${{ steps.check.outputs.incomplete }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Restore pipeline checkpoints
        uses: actions/cache/restore@v4
        with:
          path: |
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}
          restore-keys: |
            pipeline-checkpoints-

      - name: Fetch repository data
        id: fetch_data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_data.py --max-runtime 21000

      - name: Save fetch_data checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            site/data/.fetch_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}-step1

      - name: Check fetch completion
        id: check
        if: always()
        run: |
          if [ -f site/data/.incomplete_fetch ]; then
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            echo "fetch_data did not complete (max-runtime reached)."
          else
            echo "incomplete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch non-canonical awesome lists
        if: steps.check.outputs.incomplete != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_noncanonical.py --max-runtime 1800

      - name: Save noncanonical checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            site/data/.nc_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}-step2

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: |
            site/data/repos.json
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
          retention-days: 7

  fetch-resume:
    needs: fetch-main
    if: always() && (needs.fetch-main.outputs.incomplete == 'true' || needs.fetch-main.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 350
    outputs:
      incomplete: ${{ steps.check.outputs.incomplete }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Restore pipeline checkpoints
        uses: actions/cache/restore@v4
        with:
          path: |
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}
          restore-keys: |
            pipeline-checkpoints-

      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-data
          path: site/data/

      - name: Resume repository data fetch
        id: fetch_data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_data.py --max-runtime 21000

      - name: Save fetch_data checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            site/data/.fetch_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}-step1-resume

      - name: Check fetch completion
        id: check
        if: always()
        run: |
          if [ -f site/data/.incomplete_fetch ]; then
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            echo "fetch_data did not complete (max-runtime reached)."
          else
            echo "incomplete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch non-canonical awesome lists
        if: steps.check.outputs.incomplete != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_noncanonical.py --max-runtime 1800

      - name: Save noncanonical checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            site/data/.nc_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}-step2-resume

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: |
            site/data/repos.json
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
          retention-days: 7

  process:
    needs: [fetch-main, fetch-resume]
    if: always() && ((needs.fetch-main.result == 'success' && needs.fetch-main.outputs.incomplete != 'true') || (needs.fetch-resume.result == 'success' && needs.fetch-resume.outputs.incomplete != 'true'))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-data
          path: site/data/

      - name: Enrich search data
        run: nix develop --command python scripts/enrich_data.py

      - name: Compute visualization data
        run: nix develop --command python scripts/compute_viz.py

      - name: Split data for lazy loading
        run: nix develop --command python scripts/split_data.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
