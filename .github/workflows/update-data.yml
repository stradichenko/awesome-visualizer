name: Update Data

on:
  # Weekly: Wednesdays at 02:00 UTC
  schedule:
    - cron: '0 2 * * 3'
  # Manual trigger from the Actions tab
  workflow_dispatch:

# Allow only one pipeline run at a time; do not cancel in-progress runs
concurrency:
  group: update-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write         # push checkpoints branch + checkout repo
  pages: write            # deploy to GitHub Pages
  id-token: write         # OIDC for deploy-pages

jobs:
  fetch-main:
    runs-on: ubuntu-latest
    # Hard ceiling is 6h; leave 10m buffer for post-steps
    timeout-minutes: 350
    outputs:
      incomplete: ${{ steps.check.outputs.incomplete }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Restore checkpoints from branch
        run: |
          git fetch origin checkpoints || true
          if git ls-remote --heads origin checkpoints | grep -q checkpoints; then
            for f in .fetch_checkpoint.json .nc_checkpoint.json repos.json; do
              git show origin/checkpoints:site/data/$f > site/data/$f 2>/dev/null || true
            done
            echo "Restored checkpoints from checkpoints branch."
          else
            echo "No checkpoints branch found - starting fresh."
          fi

      - name: Fetch repository data
        id: fetch_data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_data.py --max-runtime 21000

      - name: Check fetch completion
        id: check_fetch
        if: always()
        run: |
          if [ -f site/data/.incomplete_fetch ]; then
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            echo "fetch_data did not complete (max-runtime reached)."
          else
            echo "incomplete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch non-canonical awesome lists
        if: steps.check_fetch.outputs.incomplete != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_noncanonical.py --max-runtime 21000

      - name: Check overall completion
        id: check
        if: always()
        run: |
          if [ -f site/data/.incomplete_fetch ] || [ -f site/data/.incomplete_nc ]; then
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            if [ -f site/data/.incomplete_fetch ]; then
              echo "fetch_data did not complete."
            fi
            if [ -f site/data/.incomplete_nc ]; then
              echo "noncanonical did not complete."
            fi
          else
            echo "incomplete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: |
            site/data/repos.json
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
          retention-days: 7

      - name: Save checkpoints to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stash checkpoint files temporarily
          mkdir -p /tmp/checkpoint-stash
          cp site/data/.fetch_checkpoint.json /tmp/checkpoint-stash/ 2>/dev/null || true
          cp site/data/.nc_checkpoint.json /tmp/checkpoint-stash/ 2>/dev/null || true
          cp site/data/repos.json /tmp/checkpoint-stash/ 2>/dev/null || true
          # Create orphan branch with only checkpoint files
          git checkout --orphan checkpoints-temp
          git reset
          mkdir -p site/data
          cp /tmp/checkpoint-stash/.fetch_checkpoint.json site/data/ 2>/dev/null || true
          cp /tmp/checkpoint-stash/.nc_checkpoint.json site/data/ 2>/dev/null || true
          cp /tmp/checkpoint-stash/repos.json site/data/ 2>/dev/null || true
          git add -f site/data/.fetch_checkpoint.json site/data/.nc_checkpoint.json site/data/repos.json
          git commit -m "checkpoint: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" || echo "No changes to commit"
          git branch -M checkpoints
          git push -f origin checkpoints
          # Return to main for any follow-up steps
          git checkout -f main

  fetch-resume:
    needs: fetch-main
    if: always() && (needs.fetch-main.outputs.incomplete == 'true' || needs.fetch-main.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 350
    outputs:
      incomplete: ${{ steps.check.outputs.incomplete }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Restore checkpoints from branch
        run: |
          git fetch origin checkpoints || true
          if git ls-remote --heads origin checkpoints | grep -q checkpoints; then
            for f in .fetch_checkpoint.json .nc_checkpoint.json repos.json; do
              git show origin/checkpoints:site/data/$f > site/data/$f 2>/dev/null || true
            done
            echo "Restored checkpoints from checkpoints branch."
          else
            echo "No checkpoints branch found - starting fresh."
          fi

      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-data
          path: site/data/

      - name: Resume repository data fetch
        id: fetch_data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_data.py --max-runtime 21000

      - name: Check fetch completion
        id: check_fetch
        if: always()
        run: |
          if [ -f site/data/.incomplete_fetch ]; then
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            echo "fetch_data did not complete (max-runtime reached)."
          else
            echo "incomplete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch non-canonical awesome lists
        if: steps.check_fetch.outputs.incomplete != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_noncanonical.py --max-runtime 21000

      - name: Check overall completion
        id: check
        if: always()
        run: |
          if [ -f site/data/.incomplete_fetch ] || [ -f site/data/.incomplete_nc ]; then
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            if [ -f site/data/.incomplete_fetch ]; then
              echo "fetch_data did not complete."
            fi
            if [ -f site/data/.incomplete_nc ]; then
              echo "noncanonical did not complete."
            fi
          else
            echo "incomplete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: |
            site/data/repos.json
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
          retention-days: 7

      - name: Save checkpoints to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/checkpoint-stash
          cp site/data/.fetch_checkpoint.json /tmp/checkpoint-stash/ 2>/dev/null || true
          cp site/data/.nc_checkpoint.json /tmp/checkpoint-stash/ 2>/dev/null || true
          cp site/data/repos.json /tmp/checkpoint-stash/ 2>/dev/null || true
          git checkout --orphan checkpoints-temp
          git reset
          mkdir -p site/data
          cp /tmp/checkpoint-stash/.fetch_checkpoint.json site/data/ 2>/dev/null || true
          cp /tmp/checkpoint-stash/.nc_checkpoint.json site/data/ 2>/dev/null || true
          cp /tmp/checkpoint-stash/repos.json site/data/ 2>/dev/null || true
          git add -f site/data/.fetch_checkpoint.json site/data/.nc_checkpoint.json site/data/repos.json
          git commit -m "checkpoint: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" || echo "No changes to commit"
          git branch -M checkpoints
          git push -f origin checkpoints
          git checkout -f main

  process:
    needs: [fetch-main, fetch-resume]
    if: always() && ((needs.fetch-main.result == 'success' && needs.fetch-main.outputs.incomplete != 'true') || (needs.fetch-resume.result == 'success' && needs.fetch-resume.outputs.incomplete != 'true'))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-data
          path: site/data/

      - name: Enrich search data
        run: nix develop --command python scripts/enrich_data.py

      - name: Compute visualization data
        run: nix develop --command python scripts/compute_viz.py

      - name: Split data for lazy loading
        run: nix develop --command python scripts/split_data.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
