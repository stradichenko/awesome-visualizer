        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: |
            site/data/repos.json
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
          retention-days: 7

      - name: Save checkpoints to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/checkpoint-stash
