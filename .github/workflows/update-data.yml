name: Update Data

on:
  # Weekly: Wednesdays at 02:00 UTC
  schedule:
    - cron: '0 2 * * 3'
  # Manual trigger from the Actions tab
  workflow_dispatch:

# Allow only one pipeline run at a time; do not cancel in-progress runs
concurrency:
  group: update-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # commit refreshed site/data/ back to main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Restore pipeline checkpoints
        uses: actions/cache/restore@v4
        with:
          path: |
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}
          restore-keys: |
            pipeline-checkpoints-

      - name: Fetch repository data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_data.py

      - name: Save fetch_data checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}-step1

      - name: Fetch non-canonical awesome lists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_noncanonical.py

      - name: Save fetch_noncanonical checkpoint
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            site/data/.fetch_checkpoint.json
            site/data/.nc_checkpoint.json
            site/data/repos.json
          key: pipeline-checkpoints-${{ github.run_id }}-step2

      - name: Enrich search data
        run: nix develop --command python scripts/enrich_data.py

      - name: Compute visualization data
        run: nix develop --command python scripts/compute_viz.py

      - name: Split data for lazy loading
        run: nix develop --command python scripts/split_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/
          git diff --cached --quiet || (git commit -m "Update repos.json [skip ci]" && git push)
