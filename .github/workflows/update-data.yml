name: Update Data and Deploy

on:
  # Weekly: Wednesdays at 02:00 UTC
  schedule:
    - cron: '0 2 * * 3'
  # Manual trigger from the Actions tab
  workflow_dispatch:

# Cancel an in-progress run if a new one is queued for the same ref
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # commit refreshed site/data/ back to main
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for the Pages deploy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Fetch repository data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_data.py

      - name: Fetch non-canonical awesome lists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command python scripts/fetch_noncanonical.py

      - name: Enrich search data
        run: nix develop --command python scripts/enrich_data.py

      - name: Compute visualization data
        run: nix develop --command python scripts/compute_viz.py

      - name: Split data for lazy loading
        run: nix develop --command python scripts/split_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/
          git diff --cached --quiet || (git commit -m "Update repos.json [skip ci]" && git push)

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
