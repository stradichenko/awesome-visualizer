      - name: Save checkpoints to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/checkpoint-stash
          cp site/data/.fetch_checkpoint.json /tmp/checkpoint-stash/ 2>/dev/null || true
          cp site/data/.nc_checkpoint.json /tmp/checkpoint-stash/ 2>/dev/null || true
          cp site/data/repos.json /tmp/checkpoint-stash/ 2>/dev/null || true
          git checkout --orphan checkpoints-temp
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mkdir -p site/data
          cp /tmp/checkpoint-stash/.fetch_checkpoint.json site/data/ 2>/dev/null || true
          cp /tmp/checkpoint-stash/.nc_checkpoint.json site/data/ 2>/dev/null || true
          cp /tmp/checkpoint-stash/repos.json site/data/ 2>/dev/null || true
          for f in site/data/.fetch_checkpoint.json site/data/.nc_checkpoint.json site/data/repos.json; do
            if [ -f "$f" ]; then
              gzip -f "$f"
              git add -f "$f.gz"
            fi
          done
          git commit -m "checkpoint: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" || echo "No changes to commit"
          git branch -M checkpoints
          git push -f origin checkpoints
          git checkout -f main

  process:
    needs: [fetch-main, fetch-resume, fetch-resume-2, fetch-resume-3, fetch-resume-4]
    if: always() && ((needs.fetch-main.result == 'success' && needs.fetch-main.outputs.incomplete != 'true') || (needs.fetch-resume.result == 'success' && needs.fetch-resume.outputs.incomplete != 'true') || (needs.fetch-resume-2.result == 'success' && needs.fetch-resume-2.outputs.incomplete != 'true') || (needs.fetch-resume-3.result == 'success' && needs.fetch-resume-3.outputs.incomplete != 'true') || (needs.fetch-resume-4.result == 'success' && needs.fetch-resume-4.outputs.incomplete != 'true'))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Ensure data directory exists
        run: mkdir -p site/data

      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-data
          path: site/data/

      - name: Enrich search data
        run: nix develop --command python scripts/enrich_data.py

      - name: Compute visualization data
        run: nix develop --command python scripts/compute_viz.py

      - name: Split data for lazy loading
        run: nix develop --command python scripts/split_data.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
