name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  # Manual trigger so we can deploy without waiting for a data refresh
  workflow_dispatch:

# Only one deploy at a time; newer push cancels the queued one
concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
